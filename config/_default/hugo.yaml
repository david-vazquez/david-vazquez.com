baseURL: 'https://www.david-vazquez.com/'
title: David Vázquez
languageCode: en-us
hasCJKLanguage: false

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

enableGitInfo: false
summaryLength: 30
paginate: 10
enableEmoji: true
enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

imaging:
  resampleFilter: lanczos
  quality: 75
  anchor: smart

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    lineNos: false
